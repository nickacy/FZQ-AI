# ============================================================
# FZQ‑AI Global Settings (V15-Final)
# ============================================================

# ------------------------------------------------------------
# Provider Enable Flags
# ------------------------------------------------------------
providers:
  deepseek:
    enabled: true
  qwen:
    enabled: true
  glm:
    enabled: true
  kimi:
    enabled: true
  openai:
    enabled: true
  gemini:
    enabled: true

# ------------------------------------------------------------
# Model Priority (fallback chain)
# ------------------------------------------------------------
model_priority:
  default_primary: "deepseek"
  fallback:
    - "qwen"
    - "glm"
    - "openai"
    - "gemini"

# ------------------------------------------------------------
# Cost Matrix (USD per 1K tokens)
# ------------------------------------------------------------
cost_matrix:
  deepseek: 0.002
  qwen: 0.0008
  glm: 0.001
  kimi: 0.002
  openai: 0.01
  gemini: 0.01

# ------------------------------------------------------------
# Context Length
# ------------------------------------------------------------
context_length:
  deepseek: 128000
  qwen: 128000
  glm: 32000
  kimi: 200000
  openai: 128000
  gemini: 100000

# ------------------------------------------------------------
# Budget & Token Monitoring
# ------------------------------------------------------------
budget:
  daily_cap_usd: 3
  weekly_cap_usd: 10
  alert_threshold: 0.8
  auto_downgrade: true

token_monitor:
  log_path: "fzqai_token_log.jsonl"

# ------------------------------------------------------------
# Router Settings
# ------------------------------------------------------------
router:
  enable_cache: true
  enable_redis_cache: true
  redis_ttl_seconds: 86400

# ------------------------------------------------------------
# Orchestrator Settings
# ------------------------------------------------------------
orchestrator:
  enable_parallel: true
  max_concurrency: 4
