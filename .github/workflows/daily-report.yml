name: Daily FZQ‑AI Report

on:
  schedule:
    - cron: "0 21 * * *"  # 悉尼早上 7 点左右（UTC 21）
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run pipelines smoke test
        run: |
          pytest -q

      # 这里未来可以加：真正生成日报并推送
