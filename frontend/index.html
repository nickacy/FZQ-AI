<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>FZQ‑AI Intelligence Dashboard (V19)</title>

    <link rel="stylesheet" href="/static/css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <script src="/static/js/i18n.js"></script>
</head>

<body>

<!-- 顶部导航栏 -->
<div class="top-nav">
    <div class="nav-left">
        <span class="brand">FZQ‑AI</span>
        <span class="brand-sub">Intelligence Officer</span>
    </div>

    <div class="nav-center">
        <button class="nav-btn" onclick="navigate('home')" aria-label="Home">
            <span id="navHomeText">首页</span>
        </button>
        <button class="nav-btn" onclick="navigate('dashboard')" aria-label="Dashboard">
            <span id="navDashboardText">仪表盘</span>
        </button>
        <button class="nav-btn" onclick="navigate('settings')" aria-label="Settings">
            <span id="navSettingsText">设置</span>
        </button>
    </div>

    <div class="nav-right">
        <button id="langZhBtn" onclick="setLanguage('zh')" aria-label="切换到中文">中文</button>
        <button id="langEnBtn" onclick="setLanguage('en')" aria-label="Switch to English">English</button>
    </div>
</div>

<!-- 状态栏 -->
<div class="status-bar">
    <span id="statusModel"></span>
    <span id="statusPipeline"></span>
    <span id="statusTrace"></span>
</div>

<!-- 主内容区 -->
<div class="container">

    <h1 id="appTitle">FZQ‑AI Intelligence Dashboard</h1>
    <h3 id="appSubtitle">Cross‑Civilization Personal Intelligence Officer</h3>

    <!-- 输入框 -->
    <div class="input-box">
        <textarea id="userInput" placeholder="请输入任务，例如：帮我做一个风险扫描"></textarea>
        <button id="submitBtn" onclick="sendQuery()">提交</button>
    </div>

    <!-- 原始 JSON 输出 -->
    <div id="resultArea"></div>

    <!-- 图表与组件区域 -->
    <div id="chartsArea">

        <div id="policyCardArea"></div>

        <canvas id="radarChart"></canvas>
        <canvas id="trendChart"></canvas>

        <div id="graphArea"></div>

        <div id="timelineArea"></div>

        <div id="sourceListArea"></div>
        <div id="mergeSummaryArea"></div>

    </div>

</div>

<script src="/static/js/dashboard.js"></script>
<script src="/static/js/entry.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/graph.js"></script>

</body>
</html>
