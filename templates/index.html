<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <title>FZQ-AI · Entry Layer V15</title>
    <link rel="stylesheet" href="/static/theme.css" />
    <style>
        .container {
            max-width: 900px;
            margin: 40px auto;
        }
        .input-box {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 1px solid #2A2A2A;
            color: #E6E6E6;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn {
            margin-top: 12px;
            padding: 10px 18px;
            background-color: #00FF41;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .result-panel {
            margin-top: 24px;
            padding: 16px;
            background-color: #161616;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 class="accent-green">FZQ-AI · Entry Layer V15</h2>

        <textarea id="input" class="input-box" rows="4"
            placeholder="请输入你的问题，例如：帮我做一份风险扫描"></textarea>

        <button class="btn" onclick="sendQuery()">提交</button>

        <div id="result" class="result-panel"></div>
    </div>

    <script>
        async function sendQuery() {
            const text = document.getElementById("input").value;

            const resp = await fetch("/entry", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, language: "zh" }),
            });

            const data = await resp.json();
            document.getElementById("result").innerHTML =
                "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
        }
    </script>
</body>
</html>
