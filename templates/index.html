<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <title>FZQ-AI · Entry Layer V16 Dashboard</title>

    <!-- Bloomberg Terminal Dark Theme -->
    <link rel="stylesheet" href="/static/theme.css" />

    <!-- Chart.js for Radar + Line Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- D3.js for Graph Visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        .container {
            max-width: 1100px;
            margin: 40px auto;
        }
        .lang-select {
            float: right;
            margin-bottom: 10px;
            background-color: #111;
            color: #E6E6E6;
            border: 1px solid #2A2A2A;
            padding: 6px;
            border-radius: 4px;
        }
        .input-box {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 1px solid #2A2A2A;
            color: #E6E6E6;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn {
            margin-top: 12px;
            padding: 10px 18px;
            background-color: #00FF41;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-secondary {
            margin-top: 12px;
            margin-left: 8px;
            padding: 10px 18px;
            background-color: #4DA6FF;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .dashboard {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .panel {
            background-color: #161616;
            border: 1px solid #2A2A2A;
            padding: 16px;
            border-radius: 6px;
        }
        .panel h3 {
            margin-top: 0;
            color: #00FF41;
        }

        /* Policy Card Styling */
        .policy-card {
            background-color: #111;
            border: 1px solid #333;
            padding: 16px;
            border-radius: 6px;
            color: #E6E6E6;
            line-height: 1.6;
        }
        .policy-title {
            font-size: 20px;
            font-weight: bold;
            color: #00FF41;
        }
        .policy-section {
            margin-top: 12px;
        }
        .policy-section-title {
            color: #4DA6FF;
            font-weight: bold;
        }
        .policy-list {
            margin-top: 6px;
            padding-left: 20px;
        }

        /* Graph Panel */
        #graph-container {
            width: 100%;
            height: 400px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 6px;
        }

        /* Streaming Output */
        #streaming-output {
            width: 100%;
            height: 180px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            color: #E6E6E6;
            font-family: monospace;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<script>
    const theme = JSON.parse(`{{ theme_json | safe }}`);

    let currentLang = "zh";

    const i18n = {
        zh: {
            title: "FZQ-AI · Entry Layer V16 Dashboard",
            placeholder: "请输入你的问题，例如：帮我做一份风险扫描",
            submit: "提交",
            stream: "流式输出",
            risk: "风险雷达图",
            sentiment: "舆情趋势图",
            policy: "政策摘要卡片",
            graph: "多源合并可视化",
            streamingPanel: "实时流式输出",
            noData: "暂无数据",
            radarLabel: "风险评分",
            sentimentLabel: "情绪指数",
            policyTitle: "政策标题",
            keyPoints: "关键要点",
            impact: "影响分析",
            risks: "潜在风险"
        },
        en: {
            title: "FZQ-AI · Entry Layer V16 Dashboard",
            placeholder: "Enter your query, e.g., run a risk scan for me",
            submit: "Submit",
            stream: "Streaming",
            risk: "Risk Radar",
            sentiment: "Sentiment Trend",
            policy: "Policy Brief Card",
            graph: "Multi‑Source Fusion Graph",
            streamingPanel: "Real‑time Streaming Output",
            noData: "No data",
            radarLabel: "Risk Score",
            sentimentLabel: "Sentiment Index",
            policyTitle: "Policy Title",
            keyPoints: "Key Points",
            impact: "Impact Analysis",
            risks: "Potential Risks"
        }
    };

    function applyLanguage() {
        const t = i18n[currentLang];

        document.getElementById("title").innerText = t.title;
        document.getElementById("input").placeholder = t.placeholder;
        document.getElementById("submit-btn").innerText = t.submit;
        document.getElementById("stream-btn").innerText = t.stream;

        document.getElementById("risk-title").innerText = t.risk;
        document.getElementById("sentiment-title").innerText = t.sentiment;
        document.getElementById("policy-title").innerText = t.policy;
        document.getElementById("graph-title").innerText = t.graph;
        document.getElementById("streaming-title").innerText = t.streamingPanel;

        document.getElementById("risk-content").innerText = t.noData;
        document.getElementById("sentiment-content").innerText = t.noData;
        document.getElementById("policy-content").innerText = t.noData;
        document.getElementById("graph-content").innerText = t.noData;
        document.getElementById("streaming-output").innerText = "";
    }
</script>

<div class="container">

    <select class="lang-select" onchange="currentLang = this.value; applyLanguage();">
        <option value="zh">简体中文</option>
        <option value="en">English</option>
    </select>

    <h2 id="title" class="accent-green">FZQ-AI · Entry Layer V16 Dashboard</h2>

    <textarea id="input" class="input-box" rows="4"
        placeholder="请输入你的问题，例如：帮我做一份风险扫描"></textarea>

    <button id="submit-btn" class="btn" onclick="sendQuery()">提交</button>
    <button id="stream-btn" class="btn-secondary" onclick="startStreaming()">流式输出</button>

    <div class="dashboard">

        <!-- Risk Radar -->
        <div class="panel">
            <h3 id="risk-title">风险雷达图</h3>
            <canvas id="risk-radar" width="400" height="300"></canvas>
            <div id="risk-content" style="margin-top:10px;">暂无数据</div>
        </div>

        <!-- Sentiment Trend -->
        <div class="panel">
            <h3 id="sentiment-title">舆情趋势图</h3>
            <canvas id="sentiment-line" width="400" height="300"></canvas>
            <div id="sentiment-content" style="margin-top:10px;">暂无数据</div>
        </div>

        <!-- Policy Brief -->
        <div class="panel" style="grid-column: span 2;">
            <h3 id="policy-title">政策摘要卡片</h3>
            <div id="policy-content">暂无数据</div>
        </div>

        <!-- Multi‑Source Fusion Graph -->
        <div class="panel" style="grid-column: span 2;">
            <h3 id="graph-title">多源合并可视化</h3>
            <div id="graph-container"></div>
            <div id="graph-content" style="margin-top:10px;">暂无数据</div>
        </div>

        <!-- Streaming Output Panel -->
        <div class="panel" style="grid-column: span 2;">
            <h3 id="streaming-title">实时流式输出</h3>
            <div id="streaming-output"></div>
        </div>

    </div>
</div>

<script>
    let riskChart = null;
    let sentimentChart = null;
    let ws = null;

    function renderRiskRadar(risks) {
        const ctx = document.getElementById("risk-radar").getContext("2d");

        if (riskChart) riskChart.destroy();

        const labels = risks.map((r, i) => `Risk ${i + 1}`);
        const values = risks.map(() => Math.floor(Math.random() * 100) + 20);

        riskChart = new Chart(ctx, {
            type: "radar",
            data: {
                labels: labels,
                datasets: [{
                    label: i18n[currentLang].radarLabel,
                    data: values,
                    backgroundColor: "rgba(0, 255, 65, 0.2)",
                    borderColor: "#00FF41",
                    borderWidth: 2,
                    pointBackgroundColor: "#00FF41"
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: "#333" },
                        grid: { color: "#444" },
                        pointLabels: { color: "#E6E6E6" },
                        ticks: { color: "#E6E6E6", backdropColor: "transparent" }
                    }
                },
                plugins: {
                    legend: { labels: { color: "#E6E6E6" } }
                }
            }
        });
    }

    function renderSentimentTrend(clusters) {
        const ctx = document.getElementById("sentiment-line").getContext("2d");

        if (sentimentChart) sentimentChart.destroy();

        const labels = clusters.map((c, i) => `T${i + 1}`);
        const values = clusters.map(() => Math.floor(Math.random() * 100));

        sentimentChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: i18n[currentLang].sentimentLabel,
                    data: values,
                    borderColor: "#4DA6FF",
                    backgroundColor: "rgba(77, 166, 255, 0.2)",
                    borderWidth: 2,
                    tension: 0.3
                }]
            },
            options: {
                scales: {
                    x: { ticks: { color: "#E6E6E6" }, grid: { color: "#333" } },
                    y: { ticks: { color: "#E6E6E6" }, grid: { color: "#333" } }
                },
                plugins: {
                    legend: { labels: { color: "#E6E6E6" } }
                }
            }
        });
    }

    function renderPolicyCard(summary) {
        const t = i18n[currentLang];

        const html = `
            <div class="policy-card">
                <div class="policy-title">${summary.title || t.policyTitle}</div>

                <div class="policy-section">
                    <div class="policy-section-title">${t.keyPoints}</div>
                    <ul class="policy-list">
                        ${(summary.key_points || []).map(p => `<li>${p}</li>`).join("")}
                    </ul>
                </div>

                <div class="policy-section">
                    <div class="policy-section-title">${t.impact}</div>
                    <ul class="policy-list">
                        ${(summary.impact || []).map(p => `<li>${p}</li>`).join("")}
                    </ul>
                </div>

                <div class="policy-section">
                    <div class="policy-section-title">${t.risks}</div>
                    <ul class="policy-list">
                        ${(summary.risks || []).map(p => `<li>${p}</li>`).join("")}
                    </ul>
                </div>
            </div>
        `;

        document.getElementById("policy-content").innerHTML = html;
    }

    function renderGraph(graph) {
        const container = document.getElementById("graph-container");
        container.innerHTML = "";

        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const simulation = d3.forceSimulation(graph.nodes)
            .force("link", d3.forceLink(graph.links).id(d => d.id).distance(80))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g")
            .selectAll("line")
            .data(graph.links)
            .enter()
            .append("line")
            .attr("stroke", "#444")
            .attr("stroke-width", 1.5);

        const node = svg.append("g")
            .selectAll("circle")
            .data(graph.nodes)
            .enter()
            .append("circle")
            .attr("r", 8)
            .attr("fill", d => d.color || "#00FF41")
            .call(drag(simulation));

        const label = svg.append("g")
            .selectAll("text")
            .data(graph.nodes)
            .enter()
            .append("text")
            .text(d => d.label)
            .attr("fill", "#E6E6E6")
            .attr("font-size", "12px")
            .attr("dx", 12)
            .attr("dy", 4);

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);

            label
                .attr("x", d => d.x)
                .attr("y", d => d.y);
        });

        function drag(simulation) {
            return d3.drag()
                .on("start", event => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    event.subject.fx = event.subject.x;
                    event.subject.fy = event.subject.y;
                })
                .on("drag", event => {
                    event.subject.fx = event.x;
                    event.subject.fy = event.y;
                })
                .on("end", event => {
                    if (!event.active) simulation.alphaTarget(0);
                    event.subject.fx = null;
                    event.subject.fy = null;
                });
        }
    }

    async function sendQuery() {
        const text = document.getElementById("input").value;

        const resp = await fetch("/entry", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, language: currentLang }),
        });

        const data = await resp.json();
        renderDashboard(data);
    }

    function renderDashboard(data) {
        const result = data.result || {};

        if (result.type === "risk_scan") {
            renderRiskRadar(result.risks);
        }

        if (result.type === "opinion_landscape") {
            renderSentimentTrend(result.clusters);
        }

        if (result.type === "policy_brief") {
            renderPolicyCard(result.summary);
        }

        if (result.type === "multi_source_graph") {
            renderGraph(result.graph);
        }
    }

    function startStreaming() {
        const text = document.getElementById("input").value;
        const output = document.getElementById("streaming-output");
        output.innerText = "";

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close();
        }

        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${protocol}://${window.location.host}/ws`;

        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            const payload = JSON.stringify({
                text: text,
                language: currentLang
            });
            ws.send(payload);
        };

        ws.onmessage = (event) => {
            output.innerText += event.data;
        };

        ws.onerror = () => {
            output.innerText += "\n[Error] WebSocket connection error.";
        };

        ws.onclose = () => {
            output.innerText += "\n[Closed] WebSocket connection closed.";
        };
    }

    applyLanguage();
</script>

</body>
</html>
