version: "3.9"

services:
  fzq-ai-backend:
    build: .
    container_name: fzq-ai-backend
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/logs:/app/data/logs
      - ./configs:/app/configs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fzq-ai-network

  fzq-ai-frontend:
    build:
      context: ./frontend-react
    container_name: fzq-ai-frontend
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - fzq-ai-backend
    environment:
      - VITE_API_BASE_URL=http://fzq-ai-backend:8000
    networks:
      - fzq-ai-network

networks:
  fzq-ai-network:
    driver: bridge
